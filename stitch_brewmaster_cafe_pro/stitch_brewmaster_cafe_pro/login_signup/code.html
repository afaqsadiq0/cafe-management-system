<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gold-rim {
            border: 1px solid #D4AF37;
        }
        .soft-shadow {
            box-shadow: 0 15px 35px rgba(62, 39, 35, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md selection:bg-tertiary-fixed selection:text-on-tertiary-fixed">
<!-- Top Navigation Bar (Simplified for Auth) -->
<header class="flex justify-between items-center w-full px-container-padding-mobile md:px-container-padding-desktop py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="font-headline-md text-headline-md text-primary">Artisanal Cafe</span>
</div>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">dark_mode</span>
</button>
</header>
<main class="min-h-[calc(100vh-80px)] flex items-center justify-center px-container-padding-mobile py-section-gap">
<div class="w-full max-w-md flex flex-col gap-unit">
<!-- Auth Card -->
<div class="bg-surface-container-lowest soft-shadow border border-outline-variant/20 rounded-xl overflow-hidden flex flex-col">
<!-- Tab Header -->
<div class="flex border-b border-outline-variant/30">
<button class="flex-1 py-4 font-label-lg text-label-lg text-primary border-b-2 border-tertiary bg-surface-container-low transition-all">
                        Login
                    </button>
<button class="flex-1 py-4 font-label-lg text-label-lg text-on-surface-variant opacity-60 hover:opacity-100 transition-all">
                        Signup
                    </button>
</div>
<div class="p-8 md:p-10 flex flex-col gap-6">
<!-- Brand Introduction -->
<div class="text-center space-y-2">
<h1 class="font-display-lg text-display-lg text-primary">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Manage your artisanal establishment with precision.</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-1 focus:ring-tertiary focus:border-tertiary transition-all placeholder:text-on-surface-variant/40" id="email" placeholder="Enter your email" type="email" value="manager@gildedbean.com"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-error rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-1 focus:ring-error transition-all" id="password" placeholder="Enter your password" type="password" value="password123"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<span class="text-error font-label-sm text-label-sm px-1">Incorrect password. Please try again.</span>
</div>
<!-- Forgot Password & Sign In -->
<div class="flex flex-col gap-6">
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-tertiary hover:text-tertiary-container transition-colors font-semibold" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-label-lg text-label-lg border-b-4 border-tertiary active:translate-y-0.5 active:border-b-2 transition-all" type="submit">
                                Sign In
                            </button>
</div>
</form>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-on-surface-variant/50">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Sign-In -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/50 py-3.5 rounded-lg font-label-lg text-label-lg text-on-surface hover:bg-surface-container-low transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google Sign-In
                    </button>
</div>
</div>
<!-- Footer Quote/Visual Anchor -->
<div class="mt-8 text-center px-4">
<p class="font-headline-sm text-headline-sm text-primary-container italic">"Precision in every pour, excellence in every detail."</p>
</div>
</div>
</main>
<!-- Visual Background Element (Subtle Coffee Texture/Mood) -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none overflow-hidden">
<img class="w-full h-full object-cover grayscale" data-alt="A macro photograph of coffee beans being roasted in a copper vat, highlighting the rich textures and metallic gleam. The lighting is low and moody, emphasizing the dark browns and amber tones of the coffee beans. This background image adds a layer of artisanal tactile luxury to the light-mode interface, maintaining a sense of sophisticated craftsmanship and sensory warmth." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGqI02dJbdWNSEtpgAqwjKYmNiJFcNN4Z7sykaiqJNxQmJ2WU_sQjY6IvwTws3LAG6XXqCOlz8kTeYx-J1QCt3mDIRtKFE5B-FUikQ3Cl9M-2V7_hZEsNBJcpaDxj6lJ0oUPUGTKA-ibJa4sV1Bg5782YE7uKVRmWDmpp_G-Iiv_Rr-ZZBuBG6qfJarqzOk49dkzOQUW3AYdCPchYqs76iIVywhMI0DdNBMzi5xzTHK9CowG2gG7KGrYE09_wZTrpQh1ZTL3HfbmY7"/>
</div>
</body></html>
